<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Admin Login</title>

<style>

body{
  font-family:Arial;
  background:#f5f6fa;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

form{
  background:white;
  padding:25px;
  border-radius:8px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  width:300px;
}

input,
button{
  width:100%;
  margin:10px 0;
  padding:10px;
  border-radius:5px;
  border:1px solid #ccc;
}

button{
  background:#4a90e2;
  color:white;
  border:none;
  cursor:pointer;
}

button:hover{
  background:#357ab7;
}

</style>
</head>

<body>

<form id="loginForm">

<h2>Login</h2>

<input
type="email"
id="email"
placeholder="Email"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<button type="submit">
Login
</button>

</form>


<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

  getAuth,

  signInWithEmailAndPassword

}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";


// Firebase Config

const firebaseConfig = {

  apiKey: "AIzaSyDv0wNHZl4wSXd10B7tr9Br-7phWidLDaU",

  authDomain: "tarantino-e-learning.firebaseapp.com",

  projectId: "tarantino-e-learning",

  storageBucket: "tarantino-e-learning.firebasestorage.app",

  messagingSenderId: "501202693775",

  appId: "1:501202693775:web:fabc3af9989542c9a18afa",

  databaseURL: "https://tarantino-e-learning-default-rtdb.firebaseio.com"

};


// Initialize Firebase

const app =
  initializeApp(firebaseConfig);

const auth =
  getAuth(app);


// Login Form

const form =
  document.getElementById(
    "loginForm"
  );


// Login

form.addEventListener(

  "submit",

  async (e) => {

    e.preventDefault();

    const email =

      document.getElementById("email")
      .value
      .trim();

    const password =

      document.getElementById("password")
      .value
      .trim();

    try {

      await signInWithEmailAndPassword(

        auth,
        email,
        password

      );

      alert(
        "✅ Login successful"
      );

      // Redirect once only

      window.location.href =
      "/tarantino/tarantino E-learning/admin-dashboard.html";

    }

    catch(error){

      console.error(error);

      alert(
        "❌ "
        + error.message
      );
    }

  }

);

</script>

</body>
</html>
