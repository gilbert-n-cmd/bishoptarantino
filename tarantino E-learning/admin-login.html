<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>
<style>
  body { font-family: Arial; background:#f5f6fa; display:flex; justify-content:center; align-items:center; height:100vh; }
  form { background:white; padding:25px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.1); width:300px; }
  input, button { width:100%; margin:10px 0; padding:10px; border-radius:5px; border:1px solid #ccc; }
  button { background:#4a90e2; color:white; border:none; cursor:pointer; }
  button:hover { background:#357ab7; }
</style>
</head>
<body>
  <form id="loginForm">
    <h2>Admin Login</h2>
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD2g8x-tvOkFI0mi0gTzU2vFLo4aj8wB0s",
  authDomain: "noble-register.firebaseapp.com",
  projectId: "noble-register",
  storageBucket: "noble-register.firebasestorage.app",
  messagingSenderId: "280367520296",
  appId: "1:280367520296:web:29b32c0f9669bdfae6731d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const form = document.getElementById("loginForm");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  try {
    const userCred = await signInWithEmailAndPassword(auth, email, password);
    const uid = userCred.user.uid;

    const userDoc = await getDoc(doc(db, "users", uid));
    if (!userDoc.exists()) {
      alert("No user data found!");
      return;
    }

    const role = userDoc.data().role;
    if (role === "admin") window.location.href = "admin-dashboard.html";
    else if (role === "teacher") window.location.href = "teacher-dashboard.html";
    else window.location.href = "student-dashboard.html";

  } catch (error) {
    console.error(error);
    alert("Login failed: " + error.message);
  }
});
</script>
</body>
</html>
